version: '3.9'

services:
  api:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - DATABASE_URL=/data/securevault.db
      - ENVIRONMENT=production
    volumes:
      - db_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
